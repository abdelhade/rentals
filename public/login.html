<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxe Suits — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: rgba(21, 26, 33, 0.9);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 50px 45px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(212, 175, 55, 0.05);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 35px;
    }

    .login-logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      letter-spacing: 1px;
    }

    .login-logo h1 span { color: var(--accent-color); }

    .login-logo p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-top: 6px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent-color);
      margin: 15px auto 0;
      border-radius: 2px;
    }

    .login-title {
      font-size: 1rem;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 30px;
      font-weight: 400;
    }

    .form-group label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
    }

    .form-group {
      position: relative;
    }

    .form-group .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(calc(-50% + 12px));
      color: var(--text-secondary);
      font-size: 1rem;
      pointer-events: none;
    }

    .form-group input {
      padding-left: 40px;
      font-size: 0.95rem;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .form-group input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }

    .login-btn {
      background: var(--accent-color);
      color: var(--bg-color);
      border: none;
      padding: 14px;
      width: 100%;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.3s, transform 0.1s;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.5px;
      margin-top: 8px;
    }

    .login-btn:hover { background: var(--accent-hover); }
    .login-btn:active { transform: scale(0.99); }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-msg {
      background: rgba(249, 65, 68, 0.1);
      border: 1px solid rgba(249, 65, 68, 0.3);
      color: #f94144;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
    }

    .footer-note {
      text-align: center;
      margin-top: 25px;
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    .footer-note span {
      color: var(--accent-color);
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">

      <div class="login-logo">
        <h1>Luxe <span>Suits</span></h1>
        <p>Premium Rental Management</p>
        <div class="divider"></div>
      </div>

      <p class="login-title">Sign in to your account</p>

      <div class="error-msg" id="errorMsg">Invalid email or password.</div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Username</label>
          <input type="text" id="email" placeholder="admin" required autocomplete="username">
          <span class="input-icon">✉</span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
          <span class="input-icon">🔒</span>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
      </form>

      <p class="footer-note">Luxe Suits &copy; 2026 — <span>Internal Portal</span></p>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    // If already logged in, go straight to dashboard
    if (sessionStorage.getItem('luxe_auth') === 'true') {
      window.location.href = '/index.html';
    }

    $('#loginForm').on('submit', function(e) {
      e.preventDefault();

      const email = $('#email').val().trim();
      const password = $('#password').val().trim();
      const $btn = $('#loginBtn');
      const $err = $('#errorMsg');

      $err.hide();
      $btn.prop('disabled', true).text('Signing in...');

      // TODO: Replace with real auth API call
      setTimeout(() => {
        if (email === 'admin' && password === '1') {
          sessionStorage.setItem('luxe_auth', 'true');
          window.location.href = '/index.html';
        } else {
          $err.text('Invalid email or password.').show();
          $btn.prop('disabled', false).text('Sign In');
        }
      }, 800);
    });
  </script>
</body>
</html>
